<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>AI News</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  /* ── CSS Variables (Telegram theme aware) ── */
  :root {
    --bg:          var(--tg-theme-bg-color, #0f0f13);
    --bg2:         var(--tg-theme-secondary-bg-color, #1a1a22);
    --text:        var(--tg-theme-text-color, #f0f0f5);
    --hint:        var(--tg-theme-hint-color, #8888aa);
    --link:        var(--tg-theme-link-color, #7c6ef5);
    --accent:      var(--tg-theme-button-color, #7c6ef5);
    --accent-text: var(--tg-theme-button-text-color, #fff);
    --card-bg:     rgba(255,255,255,0.04);
    --card-border: rgba(255,255,255,0.08);
    --radius:      16px;
    --radius-sm:   10px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { height: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100%;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
    padding-bottom: 72px;
  }

  /* ── Header ── */
  .header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: var(--bg);
    padding: 12px 14px 10px;
    border-bottom: 1px solid var(--card-border);
  }
  .header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }
  .header-logo {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .logo-icon {
    width: 30px; height: 30px;
    background: linear-gradient(135deg, var(--accent), #a78bfa);
    border-radius: 9px;
    display: flex; align-items: center; justify-content: center;
    font-size: 15px;
    flex-shrink: 0;
  }
  .logo-text {
    font-size: 17px;
    font-weight: 700;
    letter-spacing: -0.3px;
  }
  .logo-text span { color: var(--accent); }
  .header-meta {
    font-size: 11px;
    color: var(--hint);
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: #4ade80; flex-shrink: 0; }
  .dot.loading { background: var(--hint); animation: pulse 1.2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  /* ── Search ── */
  .search-wrap {
    position: relative;
    margin-bottom: 10px;
  }
  .search-icon {
    position: absolute;
    left: 11px; top: 50%;
    transform: translateY(-50%);
    color: var(--hint);
    font-size: 13px;
    pointer-events: none;
  }
  .search-input {
    width: 100%;
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: var(--radius-sm);
    color: var(--text);
    font-size: 14px;
    padding: 8px 34px 8px 32px;
    outline: none;
    transition: border-color 0.2s;
    -webkit-appearance: none;
  }
  .search-input::placeholder { color: var(--hint); }
  .search-input:focus { border-color: var(--accent); }
  .search-clear {
    position: absolute;
    right: 9px; top: 50%;
    transform: translateY(-50%);
    background: none; border: none;
    color: var(--hint);
    font-size: 15px;
    cursor: pointer;
    display: none;
    line-height: 1;
    padding: 2px;
  }
  .search-clear.visible { display: block; }

  /* ── Filters ── */
  .filters {
    display: flex;
    gap: 6px;
    overflow-x: auto;
    scrollbar-width: none;
    padding-bottom: 2px;
  }
  .filters::-webkit-scrollbar { display: none; }
  .filter-btn {
    flex-shrink: 0;
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 20px;
    color: var(--hint);
    font-size: 12px;
    font-weight: 500;
    padding: 5px 11px;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .filter-btn:active { transform: scale(0.95); }
  .filter-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: var(--accent-text);
  }
  .filter-count {
    display: inline-block;
    background: rgba(255,255,255,0.2);
    border-radius: 8px;
    font-size: 10px;
    padding: 0 4px;
    margin-left: 3px;
    line-height: 15px;
    vertical-align: middle;
  }
  .filter-btn:not(.active) .filter-count {
    background: rgba(255,255,255,0.1);
  }

  /* ── Content ── */
  .content { padding: 10px 12px 0; }

  /* ── Stats bar ── */
  .stats-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 6px 2px 8px;
    font-size: 12px;
    color: var(--hint);
  }
  .stats-count { font-weight: 600; color: var(--text); }
  .refresh-link {
    background: none; border: none;
    color: var(--hint); font-size: 12px;
    cursor: pointer; padding: 0;
  }
  .refresh-link:active { color: var(--accent); }

  /* ── News Grid ── */
  .news-grid {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  /* ── News Card ── */
  .news-card {
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: var(--radius);
    padding: 13px 13px 13px 16px;
    cursor: pointer;
    transition: transform 0.12s, border-color 0.15s;
    animation: fadeIn 0.3s ease both;
    position: relative;
    overflow: hidden;
  }
  .news-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 3px; height: 100%;
    background: var(--card-accent, var(--accent));
    opacity: 0.75;
  }
  .news-card:active { transform: scale(0.985); }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .card-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 6px;
    margin-bottom: 7px;
  }
  .card-badges {
    display: flex;
    align-items: center;
    gap: 5px;
    flex-wrap: wrap;
    flex: 1;
    min-width: 0;
  }
  .badge {
    font-size: 10px;
    font-weight: 600;
    padding: 2px 6px;
    border-radius: 6px;
    letter-spacing: 0.2px;
    white-space: nowrap;
  }
  .badge-source {
    background: rgba(255,255,255,0.07);
    color: var(--hint);
    max-width: 120px;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .badge-category {
    background: var(--cat-bg, rgba(124,110,245,0.18));
    color: var(--cat-color, var(--accent));
  }
  .card-date {
    font-size: 10px;
    color: var(--hint);
    white-space: nowrap;
    flex-shrink: 0;
    margin-top: 1px;
  }

  .card-title {
    font-size: 14px;
    font-weight: 600;
    line-height: 1.4;
    color: var(--text);
    margin-bottom: 6px;
  }
  .card-summary {
    font-size: 12px;
    color: var(--hint);
    line-height: 1.55;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
    margin-bottom: 9px;
  }
  .card-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .card-link {
    font-size: 12px;
    color: var(--link);
    text-decoration: none;
    font-weight: 500;
    display: flex;
    align-items: center;
    gap: 3px;
  }
  .card-link:active { opacity: 0.7; }

  /* ── Category colors ── */
  .cat-llm     { --cat-bg: rgba(124,110,245,0.18); --cat-color: #a78bfa; --card-accent: #7c6ef5; }
  .cat-robots  { --cat-bg: rgba(251,146,60,0.18);  --cat-color: #fb923c; --card-accent: #f97316; }
  .cat-product { --cat-bg: rgba(52,211,153,0.18);  --cat-color: #34d399; --card-accent: #10b981; }
  .cat-research{ --cat-bg: rgba(96,165,250,0.18);  --cat-color: #60a5fa; --card-accent: #3b82f6; }
  .cat-business{ --cat-bg: rgba(251,191,36,0.18);  --cat-color: #fbbf24; --card-accent: #f59e0b; }
  .cat-safety  { --cat-bg: rgba(248,113,113,0.18); --cat-color: #f87171; --card-accent: #ef4444; }
  .cat-other   { --cat-bg: rgba(148,163,184,0.18); --cat-color: #94a3b8; --card-accent: #64748b; }

  /* ── States ── */
  .state-box {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 48px 24px;
    text-align: center;
    gap: 10px;
  }
  .state-icon { font-size: 38px; }
  .state-title { font-size: 15px; font-weight: 600; }
  .state-sub { font-size: 13px; color: var(--hint); }
  .spinner {
    width: 26px; height: 26px;
    border: 3px solid var(--card-border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Analysis ── */
  .analysis-wrap { padding: 4px 0; }
  .analysis-btn {
    width: 100%;
    background: var(--accent);
    color: var(--accent-text);
    border: none;
    border-radius: var(--radius-sm);
    font-size: 14px;
    font-weight: 600;
    padding: 13px;
    cursor: pointer;
    margin-bottom: 12px;
    transition: opacity 0.2s;
  }
  .analysis-btn:disabled { opacity: 0.6; cursor: default; }
  .analysis-block {
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: var(--radius);
    padding: 15px;
    font-size: 13px;
    line-height: 1.7;
    color: var(--text);
    white-space: pre-wrap;
  }

  /* ── Bottom nav ── */
  .bottom-nav {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: var(--bg);
    border-top: 1px solid var(--card-border);
    display: flex;
    padding: 6px 0 max(6px, env(safe-area-inset-bottom));
    z-index: 100;
  }
  .nav-btn {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    background: none;
    border: none;
    color: var(--hint);
    font-size: 10px;
    font-weight: 500;
    cursor: pointer;
    padding: 4px 0;
    transition: color 0.15s;
  }
  .nav-btn .nav-icon { font-size: 20px; line-height: 1; }
  .nav-btn.active { color: var(--accent); }

  /* ── Search highlight ── */
  mark {
    background: rgba(124,110,245,0.35);
    color: var(--text);
    border-radius: 2px;
    padding: 0 1px;
  }
</style>
</head>
<body>

<!-- ── Header ── -->
<div class="header">
  <div class="header-top">
    <div class="header-logo">
      <div class="logo-icon">🤖</div>
      <div class="logo-text"><span>AI</span> News</div>
    </div>
    <div class="header-meta">
      <div class="dot loading" id="status-dot"></div>
      <span id="header-meta-text">Загрузка...</span>
    </div>
  </div>

  <!-- Search (hidden until news loaded) -->
  <div class="search-wrap" id="search-wrap" style="display:none">
    <span class="search-icon">🔍</span>
    <input
      class="search-input"
      id="search-input"
      type="search"
      placeholder="Поиск по новостям..."
      autocomplete="off"
      oninput="onSearch(this.value)"
    >
    <button class="search-clear" id="search-clear" onclick="clearSearch()">✕</button>
  </div>

  <!-- Filters (hidden until news loaded) -->
  <div class="filters" id="filters-bar" style="display:none">
    <button class="filter-btn active" data-cat="all" onclick="setFilter('all',this)">
      Все <span class="filter-count" id="cnt-all">0</span>
    </button>
    <button class="filter-btn cat-llm" data-cat="llm" onclick="setFilter('llm',this)">
      🧠 LLM <span class="filter-count" id="cnt-llm">0</span>
    </button>
    <button class="filter-btn cat-product" data-cat="product" onclick="setFilter('product',this)">
      🚀 Продукты <span class="filter-count" id="cnt-product">0</span>
    </button>
    <button class="filter-btn cat-research" data-cat="research" onclick="setFilter('research',this)">
      🔬 Исследования <span class="filter-count" id="cnt-research">0</span>
    </button>
    <button class="filter-btn cat-robots" data-cat="robots" onclick="setFilter('robots',this)">
      🤖 Роботы <span class="filter-count" id="cnt-robots">0</span>
    </button>
    <button class="filter-btn cat-business" data-cat="business" onclick="setFilter('business',this)">
      💼 Бизнес <span class="filter-count" id="cnt-business">0</span>
    </button>
    <button class="filter-btn cat-safety" data-cat="safety" onclick="setFilter('safety',this)">
      🛡 Безопасность <span class="filter-count" id="cnt-safety">0</span>
    </button>
  </div>
</div>

<!-- ── Content ── -->
<div class="content" id="main-content">
  <!-- News tab -->
  <div id="tab-news">
    <div class="stats-bar" id="stats-bar" style="display:none">
      <span>Показано: <span class="stats-count" id="stats-shown">0</span> из <span id="stats-total">0</span></span>
      <button class="refresh-link" onclick="loadNews(true)">↻ обновить</button>
    </div>
    <div class="news-grid" id="news-list">
      <div class="state-box">
        <div class="spinner"></div>
        <div class="state-title">Загружаю новости...</div>
        <div class="state-sub">Это займёт несколько секунд</div>
      </div>
    </div>
  </div>

  <!-- Analysis tab -->
  <div id="tab-analysis" style="display:none">
    <div class="analysis-wrap">
      <button class="analysis-btn" id="analyze-btn" onclick="loadAnalysis()">
        🔍 Получить AI-анализ новостей
      </button>
      <div id="analysis-content"></div>
    </div>
  </div>
</div>

<!-- ── Bottom Nav ── -->
<div class="bottom-nav">
  <button class="nav-btn active" id="nav-news" onclick="showTab('news')">
    <span class="nav-icon">📰</span>Новости
  </button>
  <button class="nav-btn" id="nav-analysis" onclick="showTab('analysis')">
    <span class="nav-icon">🧠</span>Анализ
  </button>
</div>

<script>
// ── Telegram WebApp ───────────────────────────────────────────────────────────
const tg = window.Telegram?.WebApp;
if (tg) { tg.ready(); tg.expand(); }

// ── State ─────────────────────────────────────────────────────────────────────
let allNews      = [];
let activeFilter = 'all';
let searchQuery  = '';

// ── Category detection ────────────────────────────────────────────────────────
const CAT_RULES = [
  { id: 'llm',      kw: ['gpt','llm','claude','gemini','mistral','llama','qwen','deepseek',
      'language model','transformer','chatgpt','openai','anthropic','большая языковая',
      'нейросет','языковая модель','o1','o3','o4','grok','perplexity'] },
  { id: 'robots',   kw: ['robot','humanoid','boston dynamics','figure','optimus','tesla bot',
      'physical ai','робот','гуманоид','манипулятор','дрон','drone','embodied'] },
  { id: 'product',  kw: ['launch','release','update','product','app','feature','api','sdk',
      'plugin','tool','релиз','запуск','обновление','продукт','приложение','инструмент','сервис'] },
  { id: 'research', kw: ['paper','research','study','benchmark','arxiv','dataset','training',
      'fine-tun','исследование','статья','датасет','обучение','эксперимент','научн','preprint'] },
  { id: 'business', kw: ['funding','investment','startup','valuation','ipo','acquisition','deal',
      'billion','million','инвестиц','стартап','сделка','миллиард','миллион','оценка','раунд'] },
  { id: 'safety',   kw: ['safety','alignment','risk','regulation','ban','policy','ethics','bias',
      'hallucin','безопасность','регулирование','риск','этика','запрет','политика','jailbreak'] },
];

function detectCategory(item) {
  const text = ((item.title || '') + ' ' + (item.summary || '')).toLowerCase();
  for (const cat of CAT_RULES) {
    if (cat.kw.some(kw => text.includes(kw))) return cat.id;
  }
  return 'other';
}

const CAT_META = {
  llm:      { label: 'LLM',           emoji: '🧠' },
  robots:   { label: 'Роботы',        emoji: '🤖' },
  product:  { label: 'Продукты',      emoji: '🚀' },
  research: { label: 'Исследования',  emoji: '🔬' },
  business: { label: 'Бизнес',        emoji: '💼' },
  safety:   { label: 'Безопасность',  emoji: '🛡' },
  other:    { label: 'Другое',        emoji: '📌' },
};

// ── Tabs ──────────────────────────────────────────────────────────────────────
function showTab(name) {
  ['news','analysis'].forEach(t => {
    document.getElementById('tab-' + t).style.display = t === name ? '' : 'none';
    document.getElementById('nav-' + t).classList.toggle('active', t === name);
  });
  const isNews = name === 'news';
  document.getElementById('search-wrap').style.display  = (isNews && allNews.length) ? '' : 'none';
  document.getElementById('filters-bar').style.display  = (isNews && allNews.length) ? '' : 'none';
  document.getElementById('stats-bar').style.display    = (isNews && allNews.length) ? '' : 'none';
}

// ── Filters ───────────────────────────────────────────────────────────────────
function setFilter(cat, btn) {
  activeFilter = cat;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderFiltered();
}

function updateCounts(news) {
  const counts = { all: news.length };
  ['llm','robots','product','research','business','safety','other'].forEach(c => { counts[c] = 0; });
  news.forEach(n => { counts[n._cat] = (counts[n._cat] || 0) + 1; });
  Object.entries(counts).forEach(([k, v]) => {
    const el = document.getElementById('cnt-' + k);
    if (el) el.textContent = v;
  });
}

// ── Search ────────────────────────────────────────────────────────────────────
function onSearch(q) {
  searchQuery = q.trim().toLowerCase();
  document.getElementById('search-clear').classList.toggle('visible', q.length > 0);
  renderFiltered();
}

function clearSearch() {
  document.getElementById('search-input').value = '';
  onSearch('');
}

function highlight(text, q) {
  if (!q) return esc(text);
  const safeText = esc(text);
  const safeQ = q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  return safeText.replace(new RegExp(safeQ, 'gi'), m => `<mark>${m}</mark>`);
}

// ── Render ────────────────────────────────────────────────────────────────────
function renderFiltered() {
  let items = allNews;

  if (activeFilter !== 'all') {
    items = items.filter(n => n._cat === activeFilter);
  }
  if (searchQuery) {
    items = items.filter(n =>
      (n.title   || '').toLowerCase().includes(searchQuery) ||
      (n.summary || '').toLowerCase().includes(searchQuery) ||
      (n.source  || '').toLowerCase().includes(searchQuery)
    );
  }

  document.getElementById('stats-shown').textContent = items.length;
  document.getElementById('stats-total').textContent = allNews.length;

  const list = document.getElementById('news-list');
  if (!items.length) {
    list.innerHTML = `
      <div class="state-box">
        <div class="state-icon">${searchQuery ? '🔍' : '📭'}</div>
        <div class="state-title">${searchQuery ? 'Ничего не найдено' : 'Нет новостей в этой категории'}</div>
        <div class="state-sub">${searchQuery ? 'Попробуйте другой запрос' : 'Попробуйте другой фильтр'}</div>
      </div>`;
    return;
  }

  const q = searchQuery;
  list.innerHTML = items.map((item, i) => {
    const cat   = CAT_META[item._cat] || CAT_META.other;
    const delay = Math.min(i * 0.035, 0.45).toFixed(2);
    const dateStr = formatDate(item.published);
    return `
    <div class="news-card cat-${item._cat}" style="animation-delay:${delay}s">
      <div class="card-header">
        <div class="card-badges">
          <span class="badge badge-source">${esc(item.source || 'Источник')}</span>
          <span class="badge badge-category">${cat.emoji} ${cat.label}</span>
        </div>
        ${dateStr ? `<span class="card-date">${dateStr}</span>` : ''}
      </div>
      <div class="card-title">${highlight(item.title || '', q)}</div>
      ${item.summary ? `<div class="card-summary">${highlight(item.summary, q)}</div>` : ''}
      <div class="card-footer">
        ${item.link
          ? `<a class="card-link" href="${esc(item.link)}" target="_blank">Читать статью →</a>`
          : '<span></span>'}
      </div>
    </div>`;
  }).join('');
}

// ── Date formatting ───────────────────────────────────────────────────────────
function formatDate(raw) {
  if (!raw) return '';
  try {
    const d = new Date(raw);
    if (isNaN(d)) return raw;
    const diff = (Date.now() - d) / 1000;
    if (diff < 3600)   return Math.floor(diff / 60) + ' мин назад';
    if (diff < 86400)  return Math.floor(diff / 3600) + ' ч назад';
    if (diff < 172800) return 'вчера';
    return d.toLocaleDateString('ru-RU', { day: 'numeric', month: 'short' });
  } catch { return raw; }
}

// ── Load news ─────────────────────────────────────────────────────────────────
async function loadNews(forceRefresh = false) {
  const list = document.getElementById('news-list');
  const dot  = document.getElementById('status-dot');
  const meta = document.getElementById('header-meta-text');

  dot.classList.add('loading');
  meta.textContent = 'Загрузка...';
  document.getElementById('search-wrap').style.display  = 'none';
  document.getElementById('filters-bar').style.display  = 'none';
  document.getElementById('stats-bar').style.display    = 'none';

  list.innerHTML = `
    <div class="state-box">
      <div class="spinner"></div>
      <div class="state-title">Загружаю новости...</div>
      <div class="state-sub">Это займёт несколько секунд</div>
    </div>`;

  try {
    const url  = forceRefresh ? '/api/news?refresh=1' : '/api/news';
    const r    = await fetch(url);
    const data = await r.json();
    if (!data.ok) throw new Error(data.error || 'Ошибка API');

    allNews = (data.items || []).map(item => ({ ...item, _cat: detectCategory(item) }));

    updateCounts(allNews);
    renderFiltered();

    document.getElementById('search-wrap').style.display  = '';
    document.getElementById('filters-bar').style.display  = '';
    document.getElementById('stats-bar').style.display    = '';

    dot.classList.remove('loading');
    const updated = data.updated
      ? new Date(data.updated * 1000).toLocaleTimeString('ru-RU', {hour:'2-digit', minute:'2-digit'})
      : '';
    meta.textContent = `${allNews.length} новостей · ${updated}`;

  } catch(e) {
    dot.classList.remove('loading');
    meta.textContent = 'Ошибка загрузки';
    list.innerHTML = `
      <div class="state-box">
        <div class="state-icon">❌</div>
        <div class="state-title">Не удалось загрузить</div>
        <div class="state-sub">${esc(e.message)}</div>
      </div>`;
  }
}

// ── Load analysis ─────────────────────────────────────────────────────────────
async function loadAnalysis() {
  const btn     = document.getElementById('analyze-btn');
  const content = document.getElementById('analysis-content');
  btn.disabled  = true;
  btn.textContent = '⏳ Анализирую...';
  content.innerHTML = `
    <div class="state-box">
      <div class="spinner"></div>
      <div class="state-title">GPT анализирует новости...</div>
      <div class="state-sub">Обычно 10–20 секунд</div>
    </div>`;
  try {
    const r    = await fetch('/api/analyze');
    const data = await r.json();
    if (!data.ok) throw new Error(data.error || 'Ошибка API');
    content.innerHTML = `<div class="analysis-block">${esc(data.analysis)}</div>`;
    btn.textContent = '🔄 Обновить анализ';
    btn.disabled = false;
  } catch(e) {
    content.innerHTML = `
      <div class="state-box">
        <div class="state-icon">❌</div>
        <div class="state-title">Ошибка анализа</div>
        <div class="state-sub">${esc(e.message)}</div>
      </div>`;
    btn.textContent = '🔍 Попробовать снова';
    btn.disabled = false;
  }
}

// ── Utils ─────────────────────────────────────────────────────────────────────
function esc(s) {
  return String(s || '')
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

// ── Init ──────────────────────────────────────────────────────────────────────
loadNews();
</script>
</body>
</html>
