<!doctype html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Dmitrii Yudin | AI Strategy &amp; Growth</title>
<!-- PWA -->
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#0A0A0A">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="AI News">
<link rel="apple-touch-icon" href="/icons/apple-touch-icon.png?v=2">
<link rel="apple-touch-icon" sizes="152x152" href="/icons/icon-152.png?v=2">
<link rel="apple-touch-icon" sizes="120x120" href="/icons/icon-120.png?v=2">
<!-- /PWA -->
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
:root {
  --bg:        #0A0A0A;
  --surface:   #141414;
  --surface2:  #1A1A1A;
  --border:    #262626;
  --border2:   #333333;
  --text:      #FAFAFA;
  --muted:     #737373;
  --muted2:    #525252;
  --accent:    #E8FF47;
  --accent-2:  #FF6B35;
  --green:     #4ADE80;
  --red:       #F87171;
  --blue:      #60A5FA;
  --r:         12px;
  --r-sm:      8px;
  --r-xs:      6px;
  --font-serif:'Instrument Serif', Georgia, serif;
  --font-sans: 'DM Sans', -apple-system, system-ui, sans-serif;
}
*,*::before,*::after { box-sizing:border-box; margin:0; padding:0 }
html { height:100%; background:var(--bg); scroll-behavior:smooth }
body {
  font-family: var(--font-sans);
  background: var(--bg);
  color: var(--text);
  min-height: 100%;
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
  padding-bottom: 72px;
}
a { color:inherit; text-decoration:none }
button { font-family:var(--font-sans); cursor:pointer }

/* ── HEADER ── */
.header {
  position: sticky; top: 0; z-index: 200;
  background: rgba(10,10,10,0.85);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border);
  padding: 14px 16px 0;
}
.header-row {
  display: flex; align-items: center;
  justify-content: space-between; margin-bottom: 14px;
}
.brand { display:flex; align-items:center; gap:10px }
.brand-mark {
  width: 30px; height: 30px;
  background: var(--accent);
  border-radius: 7px;
  display: flex; align-items:center; justify-content:center;
  flex-shrink: 0;
}
.brand-mark svg { width:15px; height:15px }
.brand-name {
  font-family: var(--font-sans);
  font-size: 13px; font-weight: 600;
  letter-spacing: -0.2px; color: var(--text);
  white-space: nowrap;
}
.brand-name span { color: var(--muted); font-weight: 400 }

.header-status {
  display: flex; align-items:center; gap:6px;
  font-size: 11px; color: var(--muted);
  font-family: var(--font-sans);
}
.status-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--green); flex-shrink: 0;
}
.status-dot.loading  { background: var(--muted2); animation: blink 1.4s infinite }
.status-dot.working  { background: var(--accent); animation: blink 1.4s infinite }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

/* ── SEARCH ── */
.search-row { position:relative; margin-bottom:10px }
.search-input {
  width: 100%;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r-sm);
  color: var(--text);
  font-family: var(--font-sans);
  font-size: 14px;
  padding: 10px 36px 10px 14px;
  outline: none;
  transition: border-color 0.2s;
  -webkit-appearance: none;
}
.search-input::placeholder { color: var(--muted2) }
.search-input:focus { border-color: var(--accent) }
.search-clear {
  position: absolute; right:11px; top:50%;
  transform: translateY(-50%);
  background: none; border: none;
  color: var(--muted); font-size: 14px;
  display: none; line-height:1; padding:3px;
}
.search-clear.show { display:block }

/* ── FILTERS ── */
.filters {
  display: flex; gap:6px;
  overflow-x: auto; scrollbar-width: none;
  padding-bottom: 12px;
}
.filters::-webkit-scrollbar { display:none }
.chip {
  flex-shrink: 0;
  background: none;
  border: 1px solid var(--border);
  border-radius: 100px;
  color: var(--muted);
  font-family: var(--font-sans);
  font-size: 12px; font-weight: 500;
  padding: 5px 13px;
  transition: all 0.15s;
  white-space: nowrap;
}
.chip:active { transform: scale(0.96) }
.chip.on {
  background: var(--accent);
  border-color: var(--accent);
  color: #000; font-weight: 600;
}
.chip-n {
  display: inline-block;
  font-size: 10px; opacity: 0.6;
  margin-left: 2px;
}

/* ── CONTENT ── */
.content { padding: 12px 14px 0 }

.stats-row {
  display: flex; align-items:center;
  justify-content: space-between;
  margin-bottom: 12px;
  font-size: 12px; color: var(--muted);
}
.stats-row strong { color: var(--text); font-weight: 500 }
.refresh-btn {
  background: none; border: none;
  color: var(--muted); font-size: 12px;
  font-family: var(--font-sans);
  padding: 0; transition: color 0.15s;
}
.refresh-btn:active { color: var(--accent) }

.notice {
  display: flex; align-items:center; gap:9px;
  border: 1px solid rgba(232,255,71,0.15);
  border-radius: var(--r-sm);
  padding: 10px 13px; margin-bottom: 10px;
  font-size: 12px; color: var(--accent);
}
.notice .spin-xs {
  width:12px; height:12px; flex-shrink:0;
  border: 1.5px solid rgba(232,255,71,0.25);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}

/* ── SKELETON ── */
.skel-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 16px; margin-bottom: 8px;
}
.skel {
  background: linear-gradient(90deg,
    rgba(255,255,255,0.03) 25%,
    rgba(255,255,255,0.07) 50%,
    rgba(255,255,255,0.03) 75%);
  background-size: 200% 100%;
  animation: shimmer 1.6s infinite;
  border-radius: 4px;
}
@keyframes shimmer { to { background-position:-200% 0 } }

/* ── CARD ── */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 15px 15px 13px;
  margin-bottom: 8px;
  position: relative; overflow: hidden;
  animation: fadeUp 0.3s ease both;
  transition: border-color 0.2s, background 0.2s;
}
.card:hover { border-color: var(--border2) }
.card::before {
  content: '';
  position: absolute; top:0; left:0;
  width: 3px; height: 100%;
  background: var(--card-line, var(--accent));
  opacity: 0.5;
  border-radius: 3px 0 0 3px;
}
.card.selected {
  border-color: var(--accent);
  background: rgba(232,255,71,0.04);
}
.card.selected::before { opacity: 1 }

@keyframes fadeUp {
  from { opacity:0; transform:translateY(10px) }
  to   { opacity:1; transform:translateY(0) }
}

.card-meta {
  display: flex; align-items:center;
  justify-content: space-between;
  margin-bottom: 9px; gap:8px;
}
.card-meta-left {
  display:flex; align-items:center;
  gap:8px; flex:1; min-width:0;
}
.card-tags {
  display:flex; align-items:center;
  gap:5px; flex:1; min-width:0;
}
.tag {
  font-size: 10px; font-weight: 600;
  letter-spacing: 0.3px;
  padding: 2px 8px; border-radius: 100px;
  white-space: nowrap; overflow:hidden; text-overflow:ellipsis;
}
.tag-src {
  background: rgba(255,255,255,0.06);
  color: var(--muted); max-width:100px;
}
.tag-cat {
  background: var(--cat-bg, rgba(232,255,71,0.1));
  color: var(--cat-c, var(--accent));
}
.tag-ru {
  background: rgba(74,222,128,0.1);
  color: var(--green);
}
.card-date {
  font-size: 11px; color: var(--muted2); flex-shrink:0;
}

.card-check {
  width: 20px; height: 20px; flex-shrink:0;
  border: 1.5px solid var(--border2);
  border-radius: 5px; background: none;
  display:flex; align-items:center; justify-content:center;
  transition: all 0.15s; cursor:pointer; padding:0;
}
.card-check.checked {
  background: var(--accent); border-color: var(--accent);
}
.card-check svg { width:11px; height:11px; display:none }
.card-check.checked svg { display:block }

.card-title {
  font-family: var(--font-sans);
  font-size: 14px; font-weight: 500;
  line-height: 1.5; color: var(--text);
  margin-bottom: 6px; letter-spacing: -0.1px;
}
.card-summary {
  font-size: 13px; color: var(--muted);
  line-height: 1.65; margin-bottom: 11px;
  display: -webkit-box;
  -webkit-line-clamp: 3;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.card-footer {
  display:flex; align-items:center;
  justify-content: space-between;
}
.card-link {
  font-size: 12px; color: var(--accent);
  font-weight: 500; transition: opacity 0.15s;
  display: flex; align-items:center; gap:4px;
}
.card-link:active { opacity: 0.6 }
.card-link svg { width:12px; height:12px }
.card-orig-btn {
  background: none; border: none;
  font-size: 11px; color: var(--muted2);
  font-family: var(--font-sans);
  padding: 0; transition: color 0.15s;
}
.card-orig-btn:active { color: var(--accent) }
.orig-block {
  display: none; margin-top: 11px;
  padding: 10px 12px;
  background: rgba(255,255,255,0.02);
  border-radius: var(--r-sm);
  border-left: 2px solid var(--border2);
}
.orig-block.show { display:block }
.orig-label {
  font-size: 10px; font-weight: 600;
  color: var(--muted2); letter-spacing: 0.5px;
  text-transform: uppercase; margin-bottom: 5px;
}
.orig-text { font-size: 12px; color: var(--muted); line-height: 1.55 }

/* category color tokens */
.c-llm      { --cat-bg:rgba(96,165,250,0.1);  --cat-c:var(--blue);   --card-line:var(--blue) }
.c-robots   { --cat-bg:rgba(232,255,71,0.1);   --cat-c:var(--accent); --card-line:var(--accent) }
.c-product  { --cat-bg:rgba(74,222,128,0.1);   --cat-c:var(--green);  --card-line:var(--green) }
.c-research { --cat-bg:rgba(96,165,250,0.1);   --cat-c:#93C5FD;       --card-line:var(--blue) }
.c-business { --cat-bg:rgba(255,107,53,0.1);   --cat-c:var(--accent-2); --card-line:var(--accent-2) }
.c-safety   { --cat-bg:rgba(248,113,113,0.1);  --cat-c:var(--red);    --card-line:var(--red) }
.c-other    { --cat-bg:rgba(255,255,255,0.05); --cat-c:var(--muted);  --card-line:var(--muted2) }

/* ── STATES ── */
.state {
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  padding: 56px 24px; text-align:center; gap:8px;
}
.state-icon {
  width:48px; height:48px;
  border: 1px solid var(--border2);
  border-radius: 50%;
  display:flex; align-items:center; justify-content:center;
  margin-bottom: 4px;
}
.state-icon svg { width:20px; height:20px; color:var(--muted) }
.state-title { font-size:15px; font-weight:500; color:var(--text) }
.state-sub   { font-size:13px; color:var(--muted) }

.spinner {
  width:24px; height:24px;
  border: 2px solid var(--border2);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.75s linear infinite;
}
@keyframes spin { to { transform:rotate(360deg) } }

/* ── ANALYSIS TAB ── */
.analysis-section { padding: 4px 0 }
.section-label {
  font-size: 11px; font-weight: 600;
  letter-spacing: 0.5px; text-transform: uppercase;
  color: var(--muted); margin-bottom: 12px;
}

/* Buttons */
.primary-btn {
  width: 100%;
  background: var(--accent); color: #000;
  border: none; border-radius: var(--r-sm);
  font-family: var(--font-sans);
  font-size: 14px; font-weight: 600;
  padding: 14px; transition: opacity 0.2s, transform 0.1s;
  margin-bottom: 8px; letter-spacing: -0.1px;
}
.primary-btn:disabled { opacity: 0.4; cursor: default }
.primary-btn:active:not(:disabled) { opacity: 0.85; transform: scale(0.99) }

.secondary-btn {
  width: 100%;
  background: none;
  border: 1px solid var(--border2);
  border-radius: var(--r-sm);
  color: var(--text);
  font-family: var(--font-sans);
  font-size: 14px; font-weight: 500;
  padding: 13px; transition: all 0.2s;
  margin-bottom: 8px;
}
.secondary-btn:disabled { opacity: 0.35; cursor: default }
.secondary-btn:active:not(:disabled) {
  border-color: var(--accent); color: var(--accent);
}

.danger-btn {
  width: 100%;
  background: none;
  border: 1px solid rgba(248,113,113,0.25);
  border-radius: var(--r-sm);
  color: var(--red);
  font-family: var(--font-sans);
  font-size: 14px; font-weight: 500;
  padding: 13px; transition: all 0.2s;
  margin-bottom: 8px;
}
.danger-btn:active {
  border-color: var(--red);
  background: rgba(248,113,113,0.06);
}

.analysis-box {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 16px;
  font-size: 13px; line-height: 1.8;
  color: var(--muted); white-space: pre-wrap;
  margin-bottom: 14px;
}

/* ── ACTION PANEL ── */
.action-panel {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 16px; margin-bottom: 12px;
}
.action-panel-title {
  font-family: var(--font-serif);
  font-size: 20px; font-weight: 400;
  color: var(--text); margin-bottom: 4px;
  letter-spacing: -0.3px;
}
.action-panel-sub {
  font-size: 12px; color: var(--muted);
  margin-bottom: 14px;
}

.action-content {
  font-size: 14px; line-height: 1.75;
  color: var(--text); margin-bottom: 14px;
  max-height: 340px; overflow-y: auto; outline: none;
}
.action-content[contenteditable="true"] {
  border: 1px solid var(--border2);
  border-radius: var(--r-sm);
  padding: 13px;
  background: rgba(255,255,255,0.02);
  transition: border-color 0.2s;
}
.action-content[contenteditable="true"]:focus {
  border-color: var(--accent);
}
.action-content a { color: var(--accent); text-decoration:none; font-weight:500 }
.action-content::-webkit-scrollbar { width:3px }
.action-content::-webkit-scrollbar-track { background:transparent }
.action-content::-webkit-scrollbar-thumb { background:var(--border2); border-radius:2px }

.edit-hint {
  font-size: 11px; color: var(--muted2);
  margin-bottom: 10px;
  display:flex; align-items:center; gap:5px;
}
.edit-hint svg { width:11px; height:11px; flex-shrink:0 }

.divider { height:1px; background:var(--border); margin:14px 0 }

.schedule-row {
  display:flex; gap:8px;
  align-items:stretch; margin-bottom:8px;
}
.schedule-row .secondary-btn { flex:1; margin-bottom:0 }
.time-input {
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: var(--r-sm);
  color: var(--text);
  font-family: var(--font-sans);
  font-size: 14px; font-weight: 500;
  padding: 0 12px; outline: none;
  width: 92px; text-align:center;
  -webkit-appearance: none;
  transition: border-color 0.2s;
}
.time-input:focus { border-color: var(--accent) }
.time-input::-webkit-calendar-picker-indicator { filter:invert(0.4) }

.publish-result {
  display:flex; align-items:center; gap:10px;
  padding: 12px 14px; border-radius: var(--r-sm);
  font-size: 13px; font-weight: 500;
}
.publish-result.ok  { background:rgba(74,222,128,0.08);  color:var(--green); border:1px solid rgba(74,222,128,0.2) }
.publish-result.err { background:rgba(248,113,113,0.08); color:var(--red);   border:1px solid rgba(248,113,113,0.2) }
.publish-result.sch { background:rgba(96,165,250,0.08);  color:var(--blue);  border:1px solid rgba(96,165,250,0.2) }
.publish-result svg { width:16px; height:16px; flex-shrink:0 }

/* ── PLATFORM SELECTOR ── */
.platform-tabs {
  display:flex; gap:6px; margin-bottom:12px;
}
.platform-tab {
  flex:1; padding:8px 4px; border-radius:var(--r-sm);
  border:1px solid var(--border2); background:var(--surface);
  color:var(--muted); font-size:12px; font-weight:600;
  cursor:pointer; transition:all 0.18s; text-align:center;
  letter-spacing:0.02em; font-family:var(--font-sans);
}
.platform-tab.active {
  border-color:var(--accent); background:rgba(232,255,71,0.08);
  color:var(--accent);
}
.li-status {
  font-size:11px; color:var(--muted2); margin-bottom:10px;
  display:flex; align-items:center; gap:6px;
}
.li-status-dot {
  width:6px; height:6px; border-radius:50%;
  background:var(--muted2); flex-shrink:0;
}
.li-status-dot.on { background:#4ade80 }
.li-connect-btn {
  font-size:11px; color:var(--accent); text-decoration:underline;
  background:none; border:none; cursor:pointer; padding:0;
  font-family:var(--font-sans);
}

/* ── SELECTION BAR ── */
.sel-bar {
  position: fixed; bottom: 80px;
  left: 14px; right: 14px;
  background: var(--surface2);
  border: 1px solid var(--accent);
  border-radius: var(--r);
  padding: 12px 14px;
  display: flex; align-items:center; gap:10px;
  z-index: 300;
  box-shadow: 0 8px 40px rgba(0,0,0,0.6), 0 0 0 1px rgba(232,255,71,0.08);
  transform: translateY(16px); opacity:0;
  transition: transform 0.25s ease, opacity 0.25s ease;
  pointer-events: none;
}
.sel-bar.show { transform:translateY(0); opacity:1; pointer-events:auto }
.sel-bar-count {
  font-size: 13px; font-weight: 600;
  color: var(--accent); flex:1;
}
.sel-bar-btn {
  background: var(--accent); color: #000;
  border: none; border-radius: var(--r-xs);
  font-family: var(--font-sans);
  font-size: 12px; font-weight: 600;
  padding: 8px 14px; transition: opacity 0.15s;
  white-space: nowrap;
}
.sel-bar-btn:active { opacity: 0.8 }
.sel-bar-clear {
  background: none; border: none;
  color: var(--muted); font-size: 12px;
  font-family: var(--font-sans);
  padding: 0; transition: color 0.15s;
}
.sel-bar-clear:active { color: var(--text) }

/* ── BOTTOM NAV ── */
.bottom-nav {
  position: fixed; bottom:0; left:0; right:0;
  background: rgba(10,10,10,0.92);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-top: 1px solid var(--border);
  display: flex;
  padding: 0 0 max(8px, env(safe-area-inset-bottom));
  z-index: 200;
}
.nav-item {
  flex: 1;
  display: flex; flex-direction:column;
  align-items:center; gap:3px;
  background: none; border: none;
  color: var(--muted);
  font-family: var(--font-sans);
  font-size: 10px; font-weight: 500;
  letter-spacing: 0.2px;
  padding: 10px 0 6px;
  transition: color 0.15s;
  position: relative;
}
.nav-item.on { color: var(--text) }
.nav-item::after {
  content: '';
  position: absolute; top:0; left:50%;
  transform: translateX(-50%);
  width: 24px; height: 2px;
  background: var(--accent);
  border-radius: 0 0 2px 2px;
  opacity: 0; transition: opacity 0.15s;
}
.nav-item.on::after { opacity: 1 }
.nav-icon {
  width: 22px; height: 22px;
  display: flex; align-items:center; justify-content:center;
}
.nav-icon svg { width:18px; height:18px }

mark {
  background: rgba(232,255,71,0.2);
  color: var(--text); border-radius:2px; padding:0 1px;
}

/* ── HERO GRADIENT (analysis tab bg) ── */
.tab-hero-bg {
  position: absolute; top:0; left:0; right:0; height:200px;
  background:
    radial-gradient(ellipse at 20% 0%, rgba(232,255,71,0.06) 0%, transparent 60%),
    radial-gradient(ellipse at 80% 0%, rgba(255,107,53,0.04) 0%, transparent 50%);
  pointer-events: none; z-index:0;
}

/* ── RESPONSIVE ── */
@media (hover: none) {
  .card:hover { border-color: var(--border) }
}
</style>
</head>
<body>

<div class="header">
  <div class="header-row">
    <div class="brand">
      <div class="brand-mark">
        <svg viewBox="0 0 15 15" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M7.5 1L9.5 5.5H14L10.5 8.5L12 13L7.5 10L3 13L4.5 8.5L1 5.5H5.5L7.5 1Z" fill="#000" stroke="#000" stroke-width="0.5" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="brand-name">AI News <span>/ Dmitrii Yudin</span></div>
    </div>
    <div class="header-status">
      <div class="status-dot loading" id="status-dot"></div>
      <span id="status-text">Loading</span>
    </div>
  </div>
  <div class="search-row" id="search-row" style="display:none">
    <input class="search-input" id="search-input" type="search"
      placeholder="Search articles..." autocomplete="off"
      oninput="onSearch(this.value)">
    <button class="search-clear" id="search-clear" onclick="clearSearch()">&#x2715;</button>
  </div>
  <div class="filters" id="filters" style="display:none">
    <button class="chip on" data-cat="all" onclick="setFilter('all',this)">All <span class="chip-n" id="cnt-all">0</span></button>
    <button class="chip c-llm" data-cat="llm" onclick="setFilter('llm',this)">LLM <span class="chip-n" id="cnt-llm">0</span></button>
    <button class="chip c-product" data-cat="product" onclick="setFilter('product',this)">Products <span class="chip-n" id="cnt-product">0</span></button>
    <button class="chip c-research" data-cat="research" onclick="setFilter('research',this)">Research <span class="chip-n" id="cnt-research">0</span></button>
    <button class="chip c-robots" data-cat="robots" onclick="setFilter('robots',this)">Robotics <span class="chip-n" id="cnt-robots">0</span></button>
    <button class="chip c-business" data-cat="business" onclick="setFilter('business',this)">Business <span class="chip-n" id="cnt-business">0</span></button>
    <button class="chip c-safety" data-cat="safety" onclick="setFilter('safety',this)">Safety <span class="chip-n" id="cnt-safety">0</span></button>
  </div>
</div>

<div class="content" id="main-content">
  <div id="tab-news">
    <div class="stats-row" id="stats-row" style="display:none">
      <span><strong id="stats-shown">0</strong> of <strong id="stats-total">0</strong> articles</span>
      <button class="refresh-btn" onclick="loadNews(true)">Refresh</button>
    </div>
    <div id="translate-notice" class="notice" style="display:none">
      <div class="spin-xs"></div>
      <span>Translating to Russian via GPT&hellip;</span>
    </div>
    <div id="news-list"></div>
  </div>

  <div id="tab-analysis" style="display:none; position:relative">
    <div class="tab-hero-bg"></div>
    <div class="analysis-section" style="position:relative;z-index:1">
      <div class="section-label">AI Analysis</div>
      <button class="primary-btn" id="btn-analyze" onclick="doAnalyze()">Run Analysis</button>
      <div id="analysis-result" style="display:none">
        <div class="analysis-box" id="analysis-text"></div>
        <div class="section-label" style="margin-top:4px">Create Content</div>
        <button class="secondary-btn" id="btn-post" onclick="doGenerate('post')" disabled>Write Post</button>
        <button class="secondary-btn" id="btn-digest" onclick="doGenerate('digest')" disabled>Build Digest</button>
      </div>
      <div id="content-panel" style="display:none">
        <div class="action-panel">
          <div class="action-panel-title" id="content-panel-title">Post</div>
          <div class="action-panel-sub">Edit before publishing</div>
          <div class="edit-hint">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
              <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
            </svg>
            Tap to edit
          </div>
          <div class="action-content" id="content-text" contenteditable="true" oninput="onContentEdit()"></div>
          <div class="divider"></div>
          <div class="platform-tabs">
            <button class="platform-tab active" id="tab-tg" onclick="setPlatform('telegram')">Telegram</button>
            <button class="platform-tab" id="tab-li" onclick="setPlatform('linkedin')">LinkedIn</button>
            <button class="platform-tab" id="tab-both" onclick="setPlatform('both')">Both</button>
          </div>
          <div id="li-status-row" class="li-status" style="display:none">
            <div class="li-status-dot" id="li-dot"></div>
            <span id="li-status-text">Not connected</span>
            <button class="li-connect-btn" id="li-connect-btn" onclick="connectLinkedIn()">Connect</button>
          </div>
          <button class="primary-btn" id="btn-publish" onclick="doPublish()">Publish to Channel</button>
          <div class="schedule-row">
            <input class="time-input" type="time" id="schedule-time" value="10:00">
            <button class="secondary-btn" id="btn-schedule" onclick="doSchedule()">Schedule</button>
          </div>
          <button class="danger-btn" onclick="discardContent()">Discard</button>
          <div id="publish-result" style="display:none"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="sel-bar" id="sel-bar">
  <span class="sel-bar-count" id="sel-count">0 selected</span>
  <button class="sel-bar-btn" onclick="generateFromSelected('post')">Post</button>
  <button class="sel-bar-btn" onclick="generateFromSelected('digest')">Digest</button>
  <button class="sel-bar-clear" onclick="clearSelection()">Clear</button>
</div>

<div class="bottom-nav">
  <button class="nav-item on" id="nav-news" onclick="showTab('news')">
    <div class="nav-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
        <path d="M4 6h16M4 10h16M4 14h10M4 18h7"/>
      </svg>
    </div>
    News
  </button>
  <button class="nav-item" id="nav-analysis" onclick="showTab('analysis')">
    <div class="nav-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
        <path d="M12 2L2 7l10 5 10-5-10-5z"/>
        <path d="M2 17l10 5 10-5"/>
        <path d="M2 12l10 5 10-5"/>
      </svg>
    </div>
    Generate
  </button>
</div>

<script>
const tg = window.Telegram?.WebApp;
if (tg) { tg.ready(); tg.expand(); }

let allNews = [], activeFilter = 'all', searchQuery = '';
let analysisText = '', generatedContent = '', generatedType = '';
let selectedIds = new Set();
let activePlatform = 'telegram';
let liConnected = false;

// ── LinkedIn platform logic ──
async function checkLinkedInStatus() {
  try {
    const r = await fetch('/api/linkedin/status');
    const d = await r.json();
    liConnected = d.connected;
    const dot = document.getElementById('li-dot');
    const txt = document.getElementById('li-status-text');
    const btn = document.getElementById('li-connect-btn');
    if (liConnected) {
      dot.classList.add('on');
      txt.textContent = d.name || 'Connected';
      btn.textContent = 'Disconnect';
      btn.onclick = disconnectLinkedIn;
    } else {
      dot.classList.remove('on');
      txt.textContent = 'Not connected';
      btn.textContent = 'Connect';
      btn.onclick = connectLinkedIn;
    }
  } catch(e) { console.warn('LinkedIn status check failed:', e); }
}

function connectLinkedIn() {
  window.open('/linkedin/auth', '_blank', 'width=600,height=700');
  // Poll for connection after popup
  const poll = setInterval(async () => {
    const r = await fetch('/api/linkedin/status').catch(()=>null);
    if (!r) return;
    const d = await r.json();
    if (d.connected) { clearInterval(poll); checkLinkedInStatus(); }
  }, 2000);
  setTimeout(() => clearInterval(poll), 120000);
}

async function disconnectLinkedIn() {
  if (!confirm('Disconnect LinkedIn?')) return;
  await fetch('/api/linkedin/disconnect', {method:'POST'});
  liConnected = false;
  checkLinkedInStatus();
}

function setPlatform(p) {
  activePlatform = p;
  ['telegram','linkedin','both'].forEach(id => {
    const tab = document.getElementById('tab-'+id.replace('telegram','tg').replace('linkedin','li').replace('both','both'));
    if (tab) tab.classList.toggle('active', id===p);
  });
  const liRow = document.getElementById('li-status-row');
  liRow.style.display = (p==='linkedin'||p==='both') ? 'flex' : 'none';
  if (p==='linkedin'||p==='both') checkLinkedInStatus();
  // Update publish button label
  const btn = document.getElementById('btn-publish');
  if (p==='telegram') btn.textContent='Publish to Channel';
  else if (p==='linkedin') btn.textContent='Publish to LinkedIn';
  else btn.textContent='Publish to Both';
}

const CATS = [
  {id:'llm',kw:['gpt','llm','claude','gemini','mistral','llama','qwen','deepseek','language model','transformer','chatgpt','openai','anthropic','o1','o3','o4','grok','perplexity','языков','нейросет','языковая модель']},
  {id:'robots',kw:['robot','humanoid','boston dynamics','figure','optimus','physical ai','робот','гуманоид','дрон','drone','embodied']},
  {id:'product',kw:['launch','release','update','product','app','feature','api','sdk','plugin','tool','релиз','запуск','обновление','продукт','приложение','инструмент']},
  {id:'research',kw:['paper','research','study','benchmark','arxiv','dataset','training','fine-tun','исследование','статья','датасет','обучение','научн','preprint']},
  {id:'business',kw:['funding','investment','startup','valuation','ipo','acquisition','billion','million','инвестиц','стартап','сделка','миллиард','миллион','раунд']},
  {id:'safety',kw:['safety','alignment','risk','regulation','ban','policy','ethics','bias','hallucin','безопасность','регулирование','риск','этика','запрет']},
];
const CAT_LABEL = {llm:'LLM',robots:'Robotics',product:'Products',research:'Research',business:'Business',safety:'Safety',other:'Other'};

function detectCat(item) {
  const t = ((item.title||'')+(item.summary||'')+(item.title_orig||'')).toLowerCase();
  for (const c of CATS) if (c.kw.some(k=>t.includes(k))) return c.id;
  return 'other';
}

function showTab(name) {
  ['news','analysis'].forEach(t => {
    document.getElementById('tab-'+t).style.display = t===name?'':'none';
    document.getElementById('nav-'+t).classList.toggle('on', t===name);
  });
  const isNews = name==='news';
  document.getElementById('search-row').style.display  = (isNews&&allNews.length)?'':'none';
  document.getElementById('filters').style.display     = (isNews&&allNews.length)?'':'none';
  document.getElementById('stats-row').style.display   = (isNews&&allNews.length)?'':'none';
}

function setFilter(cat, btn) {
  activeFilter = cat;
  document.querySelectorAll('.chip').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  renderList();
}
function updateCounts(news) {
  const c = {all:news.length};
  ['llm','robots','product','research','business','safety','other'].forEach(k=>c[k]=0);
  news.forEach(n=>c[n._cat]=(c[n._cat]||0)+1);
  Object.entries(c).forEach(([k,v])=>{const el=document.getElementById('cnt-'+k);if(el)el.textContent=v;});
}

function onSearch(q) {
  searchQuery = q.trim().toLowerCase();
  document.getElementById('search-clear').classList.toggle('show', q.length>0);
  renderList();
}
function clearSearch() { document.getElementById('search-input').value=''; onSearch(''); }
function hl(text, q) {
  if (!q) return esc(text);
  return esc(text).replace(new RegExp(q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'gi'),m=>`<mark>${m}</mark>`);
}

function toggleSelect(globalIdx) {
  if (selectedIds.has(globalIdx)) selectedIds.delete(globalIdx);
  else selectedIds.add(globalIdx);
  const card = document.querySelector(`[data-idx="${globalIdx}"]`);
  if (card) {
    card.classList.toggle('selected', selectedIds.has(globalIdx));
    card.querySelector('.card-check')?.classList.toggle('checked', selectedIds.has(globalIdx));
  }
  updateSelBar();
}
function updateSelBar() {
  const n = selectedIds.size;
  document.getElementById('sel-count').textContent = n===1?'1 article selected':`${n} articles selected`;
  document.getElementById('sel-bar').classList.toggle('show', n>0);
}
function clearSelection() {
  selectedIds.clear();
  document.querySelectorAll('.card.selected').forEach(c=>{
    c.classList.remove('selected');
    c.querySelector('.card-check')?.classList.remove('checked');
  });
  updateSelBar();
}

function renderList() {
  let items = allNews;
  if (activeFilter!=='all') items=items.filter(n=>n._cat===activeFilter);
  if (searchQuery) items=items.filter(n=>
    (n.title||'').toLowerCase().includes(searchQuery)||
    (n.summary||'').toLowerCase().includes(searchQuery)||
    (n.title_orig||'').toLowerCase().includes(searchQuery)||
    (n.source||'').toLowerCase().includes(searchQuery)
  );
  document.getElementById('stats-shown').textContent = items.length;
  document.getElementById('stats-total').textContent = allNews.length;
  const list = document.getElementById('news-list');
  if (!items.length) {
    list.innerHTML=`<div class="state"><div class="state-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg></div><div class="state-title">${searchQuery?'No results':'No articles'}</div><div class="state-sub">${searchQuery?'Try a different query':'Try another filter'}</div></div>`;
    return;
  }
  const q = searchQuery;
  list.innerHTML = items.map(item=>{
    const gi = allNews.indexOf(item);
    const cat = item._cat, delay = Math.min(gi*0.025,0.35).toFixed(2);
    const date = fmtDate(item.published);
    const hasOrig = item.translated&&item.title_orig&&item.title_orig!==item.title;
    const cid = 'c'+gi, isSel = selectedIds.has(gi);
    return `<div class="card c-${cat}${isSel?' selected':''}" style="animation-delay:${delay}s" data-idx="${gi}">
  <div class="card-meta">
    <div class="card-meta-left">
      <button class="card-check${isSel?' checked':''}" onclick="toggleSelect(${gi})" title="Select">
        <svg viewBox="0 0 12 12" fill="none" stroke="#000" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1.5,6 4.5,9 10.5,3"/></svg>
      </button>
      <div class="card-tags">
        <span class="tag tag-src">${esc(item.source||'')}</span>
        <span class="tag tag-cat">${CAT_LABEL[cat]||cat}</span>
        ${item.translated?'<span class="tag tag-ru">RU</span>':''}
      </div>
    </div>
    ${date?`<span class="card-date">${date}</span>`:''}
  </div>
  <div class="card-title">${hl(item.title||'',q)}</div>
  ${item.summary?`<div class="card-summary">${hl(item.summary,q)}</div>`:''}
  ${hasOrig?`<div class="orig-block" id="ob-${cid}"><div class="orig-label">Original</div><div class="orig-text">${esc(item.title_orig)}${item.summary_orig?'\n'+esc(item.summary_orig):''}</div></div>`:''}
  <div class="card-footer">
    ${item.link?`<a class="card-link" href="${esc(item.link)}" target="_blank">Read <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M7 17L17 7M7 7h10v10"/></svg></a>`:'<span></span>'}
    ${hasOrig?`<button class="card-orig-btn" onclick="toggleOrig('ob-${cid}',this)">Original</button>`:''}
  </div>
</div>`;
  }).join('');
}

function toggleOrig(id, btn) {
  const el=document.getElementById(id); if(!el) return;
  el.classList.toggle('show');
  btn.textContent=el.classList.contains('show')?'Hide':'Original';
}

function fmtDate(raw) {
  if (!raw) return '';
  try {
    const d=new Date(raw), diff=(Date.now()-d)/1000;
    if (isNaN(d)) return raw;
    if (diff<3600) return Math.floor(diff/60)+'m ago';
    if (diff<86400) return Math.floor(diff/3600)+'h ago';
    if (diff<172800) return 'Yesterday';
    return d.toLocaleDateString('ru-RU',{day:'numeric',month:'short'});
  } catch { return raw; }
}

async function loadNews(force=false) {
  const dot=document.getElementById('status-dot'), stxt=document.getElementById('status-text'), list=document.getElementById('news-list');
  dot.className='status-dot loading'; stxt.textContent='Loading';
  ['search-row','filters','stats-row','translate-notice'].forEach(id=>document.getElementById(id).style.display='none');
  list.innerHTML=Array(5).fill(0).map(()=>`<div class="skel-card"><div class="skel" style="height:10px;width:45%;margin-bottom:12px"></div><div class="skel" style="height:15px;width:90%;margin-bottom:8px"></div><div class="skel" style="height:11px;width:100%;margin-bottom:5px"></div><div class="skel" style="height:11px;width:70%"></div></div>`).join('');
  const timer=setTimeout(()=>{dot.className='status-dot working';stxt.textContent='Translating';document.getElementById('translate-notice').style.display='flex';},900);
  try {
    const r=await fetch(force?'/api/news?refresh=1':'/api/news'), data=await r.json();
    clearTimeout(timer); document.getElementById('translate-notice').style.display='none';
    if (!data.ok) throw new Error(data.error||'API error');
    allNews=(data.items||[]).map(n=>({...n,_cat:detectCat(n)}));
    selectedIds.clear(); updateCounts(allNews); renderList();
    ['search-row','filters','stats-row'].forEach(id=>document.getElementById(id).style.display='');
    dot.className='status-dot';
    const upd=data.updated?new Date(data.updated*1000).toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit'}):'';
    const ru=allNews.filter(n=>n.translated).length;
    stxt.textContent=`${allNews.length} articles${upd?' · '+upd:''}${ru?' · '+ru+' RU':''}`;
  } catch(e) {
    clearTimeout(timer); document.getElementById('translate-notice').style.display='none';
    dot.className='status-dot loading'; stxt.textContent='Error';
    list.innerHTML=`<div class="state"><div class="state-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><path d="M12 8v4m0 4h.01"/></svg></div><div class="state-title">Failed to load</div><div class="state-sub">${esc(e.message)}</div></div>`;
  }
}

async function generateFromSelected(type) {
  if (selectedIds.size===0) return;
  const ids = Array.from(selectedIds);
  showTab('analysis');
  const panel=document.getElementById('content-panel'), title=document.getElementById('content-panel-title');
  const text=document.getElementById('content-text'), pubRes=document.getElementById('publish-result');
  panel.style.display='none'; pubRes.style.display='none';
  document.getElementById('analysis-result').style.display='none';
  const btn=document.getElementById('btn-analyze');
  btn.disabled=true; btn.textContent=type==='post'?'Writing post...':'Building digest...';
  try {
    const r=await fetch('/api/generate?type='+type,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({selected_ids:ids})});
    const data=await r.json();
    if (!data.ok) throw new Error(data.error||'Error');
    generatedContent=data.content; generatedType=type;
    title.textContent=type==='post'?'Post':'Digest';
    text.innerHTML=renderContent(generatedContent);
    panel.style.display='';
    document.getElementById('btn-publish').disabled=false;
    document.getElementById('btn-schedule').disabled=false;
  } catch(e) { alert('Error: '+e.message); }
  btn.disabled=false; btn.textContent='Run Analysis';
}

async function doAnalyze() {
  const btn=document.getElementById('btn-analyze'), res=document.getElementById('analysis-result'), txt=document.getElementById('analysis-text');
  btn.disabled=true; btn.textContent='Analyzing...'; res.style.display='none';
  try {
    const r=await fetch('/api/analyze'), data=await r.json();
    if (!data.ok) throw new Error(data.error||'Error');
    analysisText=data.analysis; txt.textContent=analysisText; res.style.display='';
    document.getElementById('btn-post').disabled=false;
    document.getElementById('btn-digest').disabled=false;
    btn.textContent='Re-run Analysis';
  } catch(e) { txt.textContent='Error: '+e.message; res.style.display=''; btn.textContent='Retry'; }
  btn.disabled=false;
}

async function doGenerate(type) {
  const btn=document.getElementById(type==='post'?'btn-post':'btn-digest');
  const panel=document.getElementById('content-panel'), title=document.getElementById('content-panel-title');
  const text=document.getElementById('content-text'), pubRes=document.getElementById('publish-result');
  btn.disabled=true; btn.textContent=type==='post'?'Writing...':'Building...';
  panel.style.display='none'; pubRes.style.display='none';
  try {
    const r=await fetch('/api/generate?type='+type), data=await r.json();
    if (!data.ok) throw new Error(data.error||'Error');
    generatedContent=data.content; generatedType=type;
    title.textContent=type==='post'?'Post':'Digest';
    text.innerHTML=renderContent(generatedContent);
    panel.style.display='';
    document.getElementById('btn-publish').disabled=false;
    document.getElementById('btn-schedule').disabled=false;
  } catch(e) { alert('Error: '+e.message); }
  btn.disabled=false; btn.textContent=type==='post'?'Write Post':'Build Digest';
}

function onContentEdit() { generatedContent=getEditedText(); }

function getEditedText() {
  const el=document.getElementById('content-text');
  let html=el.innerHTML;
  html=html.replace(/<br\s*\/?>/gi,'\n').replace(/<div>/gi,'\n').replace(/<\/div>/gi,'');
  html=html.replace(/<(?!\/?b>|\/?a[ >]|a href)[^>]+>/g,'');
  return html.trim();
}

async function doPublish() {
  const btn=document.getElementById('btn-publish'), res=document.getElementById('publish-result');
  btn.disabled=true; btn.textContent='Publishing...'; res.style.display='none';
  const textToSend=getEditedText()||generatedContent;
  const checkSvg=`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 6 9 17l-5-5"/></svg>`;
  const errSvg=`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 8v4m0 4h.01"/></svg>`;
  try {
    const results = [];
    // Telegram
    if (activePlatform==='telegram'||activePlatform==='both') {
      const r=await fetch('/api/publish',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text:textToSend})});
      const d=await r.json();
      if (!d.ok) throw new Error('Telegram: '+(d.error||'Error'));
      results.push('Telegram');
    }
    // LinkedIn
    if (activePlatform==='linkedin'||activePlatform==='both') {
      if (!liConnected) throw new Error('LinkedIn not connected. Click Connect first.');
      const r=await fetch('/api/publish_linkedin',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text:textToSend})});
      const d=await r.json();
      if (!d.ok) throw new Error('LinkedIn: '+(d.error||'Error'));
      results.push('LinkedIn');
    }
    res.className='publish-result ok';
    res.innerHTML=`${checkSvg} Published to ${results.join(' & ')}`;
    res.style.display='flex'; btn.textContent='Published';
  } catch(e) {
    res.className='publish-result err';
    res.innerHTML=`${errSvg} ${esc(e.message)}`;
    res.style.display='flex'; btn.disabled=false;
    btn.textContent = activePlatform==='telegram'?'Publish to Channel':activePlatform==='linkedin'?'Publish to LinkedIn':'Publish to Both';
  }
}

async function doSchedule() {
  const btn=document.getElementById('btn-schedule'), res=document.getElementById('publish-result');
  const time=document.getElementById('schedule-time').value;
  if (!time) { alert('Please select a time'); return; }
  btn.disabled=true; btn.textContent='Scheduling...'; res.style.display='none';
  const textToSend=getEditedText()||generatedContent;
  try {
    const r=await fetch('/api/schedule',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text:textToSend,time:time})});
    const data=await r.json();
    if (!data.ok) throw new Error(data.error||'Error');
    res.className='publish-result sch';
    res.innerHTML=`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg> Scheduled for ${time}`;
    res.style.display='flex'; btn.textContent='Scheduled';
  } catch(e) {
    res.className='publish-result err';
    res.innerHTML=`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 8v4m0 4h.01"/></svg> ${esc(e.message)}`;
    res.style.display='flex'; btn.disabled=false; btn.textContent='Schedule';
  }
}

function discardContent() {
  document.getElementById('content-panel').style.display='none';
  generatedContent=''; generatedType='';
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function renderContent(raw) {
  if (!raw) return '';
  const bolds=[], links=[];
  let p=raw.replace(/<b>([\s\S]*?)<\/b>/gi,(m,inner)=>{const i=bolds.length;bolds.push(`<b>${esc(inner)}</b>`);return `\x01B${i}\x01`;});
  p=p.replace(/<a\s+href="([^"]+)"[^>]*>([^<]*)<\/a>/gi,(m,href,label)=>{
    const i=links.length, safe=/^https?:\/\//i.test(href)?href:'#';
    links.push(`<a href="${safe}" target="_blank" rel="noopener">${esc(label)}</a>`);
    return `\x00L${i}\x00`;
  });
  let e=esc(p);
  links.forEach((l,i)=>e=e.replace(`\x00L${i}\x00`,l));
  bolds.forEach((b,i)=>e=e.replace(`\x01B${i}\x01`,b));
  return e.replace(/\n/g,'<br>');
}

loadNews();

    navigator.serviceWorker.register('/sw.js')
      .then(reg => console.log('SW registered:', reg.scope))
      .catch(err => console.log('SW error:', err));
  });
}
