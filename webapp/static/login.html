<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>AI News — Вход</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="/icons/apple-touch-icon.png?v=2">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:      #0A0A0A;
  --bg2:     #111111;
  --surface: #0A0A0A;
  --border:  #1E1E1E;
  --border2: #2A2A2A;
  --text:    #F0F0F0;
  --text2:   #888888;
  --text3:   #555555;
  --accent:  #E8FF47;
  --red:     #FF5555;
  --r:       12px;
}

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', system-ui, sans-serif;
  -webkit-font-smoothing: antialiased;
}

body {
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100dvh;
  padding: 24px 16px;
  background-image:
    linear-gradient(rgba(232,255,71,0.025) 1px, transparent 1px),
    linear-gradient(90deg, rgba(232,255,71,0.025) 1px, transparent 1px);
  background-size: 48px 48px;
}



/* ── Card ────────────────────────────────────────────────────── */
.card {
  width: 100%;
  max-width: 380px;
  background: var(--bg2);
  border: 1px solid var(--border2);
  border-radius: 20px;
  padding: 40px 36px 36px;
  animation: fadeUp 0.4s cubic-bezier(0.22, 1, 0.36, 1) both;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ── Logo ────────────────────────────────────────────────────── */
.logo {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 32px;
}

.logo-icon {
  width: 36px; height: 36px;
  background: var(--accent);
  border-radius: 9px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}

.logo-icon svg { width: 18px; height: 18px; }

.logo-name {
  font-family: 'Instrument Serif', Georgia, serif;
  font-size: 16px;
  color: var(--text);
  line-height: 1.2;
}

.logo-name span {
  display: block;
  font-family: 'DM Sans', sans-serif;
  font-size: 11px;
  font-weight: 400;
  color: var(--text3);
  letter-spacing: 0.3px;
  margin-top: 1px;
}

/* ── Heading ─────────────────────────────────────────────────── */
.heading {
  font-family: 'Instrument Serif', Georgia, serif;
  font-size: 28px;
  color: var(--text);
  line-height: 1.15;
  margin-bottom: 8px;
}

.subheading {
  font-size: 13px;
  color: var(--text2);
  line-height: 1.5;
  margin-bottom: 32px;
}

/* ── Form ────────────────────────────────────────────────────── */
.field {
  margin-bottom: 14px;
}

.field label {
  display: block;
  font-size: 12px;
  font-weight: 500;
  color: var(--text2);
  letter-spacing: 0.3px;
  margin-bottom: 7px;
}

.field input {
  width: 100%;
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: var(--r);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  font-weight: 400;
  padding: 12px 14px;
  outline: none;
  transition: border-color 0.15s;
  -webkit-appearance: none;
}

.field input::placeholder { color: var(--text3); }

.field input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(232,255,71,0.08);
}

/* ── Error ───────────────────────────────────────────────────── */
.error-msg {
  display: none;
  font-size: 12px;
  color: var(--red);
  background: rgba(255,85,85,0.07);
  border: 1px solid rgba(255,85,85,0.18);
  border-radius: 8px;
  padding: 10px 12px;
  margin-bottom: 16px;
  line-height: 1.4;
}
.error-msg.visible { display: block; }

/* ── Submit button ───────────────────────────────────────────── */
.submit-btn {
  width: 100%;
  background: var(--accent);
  color: #0A0A0A;
  border: none;
  border-radius: var(--r);
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  font-weight: 600;
  letter-spacing: 0.2px;
  padding: 14px;
  margin-top: 8px;
  cursor: pointer;
  transition: opacity 0.15s, transform 0.1s;
  position: relative;
  overflow: hidden;
}

.submit-btn:hover { opacity: 0.9; }
.submit-btn:active { transform: scale(0.98); opacity: 0.8; }
.submit-btn:disabled { opacity: 0.45; cursor: default; transform: none; }

/* Loading spinner inside button */
.submit-btn .spinner {
  display: none;
  width: 16px; height: 16px;
  border: 2px solid rgba(0,0,0,0.3);
  border-top-color: #000;
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
  position: absolute;
  right: 16px; top: 50%; transform: translateY(-50%);
}
.submit-btn.loading .spinner { display: block; }
.submit-btn.loading .btn-text { opacity: 0.6; }

@keyframes spin { to { transform: translateY(-50%) rotate(360deg); } }

/* ── Divider ─────────────────────────────────────────────────── */
.divider {
  height: 1px;
  background: var(--border);
  margin: 28px 0 20px;
}

/* ── Footer ──────────────────────────────────────────────────── */
.footer {
  font-size: 11px; color: var(--text3);
  text-align: center;
  letter-spacing: 0.2px;
}
</style>
</head>
<body>

<div class="card">
  <!-- Logo -->
  <div class="logo">
    <div class="logo-icon">
      <svg viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M11 2L4 10h6l-1 6 9-10h-6l2-4z" fill="#0A0A0A" stroke="#0A0A0A" stroke-width="0.5" stroke-linejoin="round"/>
      </svg>
    </div>
    <div class="logo-name">
      AI News
      <span>Dmitrii Yudin · AI Strategy</span>
    </div>
  </div>

  <!-- Heading -->
  <div class="heading">Добро пожаловать</div>
  <div class="subheading">Доступ только для авторизованных пользователей</div>

  <!-- Error -->
  <div class="error-msg" id="error-msg">Неверный логин или пароль</div>

  <!-- Form -->
  <form id="login-form" autocomplete="on">
    <div class="field">
      <label for="username">Логин</label>
      <input
        type="text"
        id="username"
        name="username"
        placeholder="Введите логин"
        autocomplete="username"
        autocapitalize="none"
        spellcheck="false"
        required
      >
    </div>
    <div class="field">
      <label for="password">Пароль</label>
      <input
        type="password"
        id="password"
        name="password"
        placeholder="Введите пароль"
        autocomplete="current-password"
        required
      >
    </div>

    <button type="submit" class="submit-btn" id="submit-btn">
      <span class="btn-text">Войти</span>
      <span class="spinner"></span>
    </button>
  </form>

  <div class="divider"></div>
  <div class="footer">Private Access · AI Strategy &amp; Growth</div>
</div>

<script>
const form    = document.getElementById('login-form');
const btn     = document.getElementById('submit-btn');
const errMsg  = document.getElementById('error-msg');

// Показываем ошибку если ?error=1 в URL
if (new URLSearchParams(location.search).get('error') === '1') {
  errMsg.classList.add('visible');
}

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  errMsg.classList.remove('visible');
  btn.disabled = true;
  btn.classList.add('loading');

  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;

  try {
    const res = await fetch('/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password }),
      credentials: 'include',
    });
    const data = await res.json();
    if (data.ok) {
      // Редирект на главную
      const next = new URLSearchParams(location.search).get('next') || '/';
      window.location.href = next;
    } else {
      errMsg.classList.add('visible');
      btn.disabled = false;
      btn.classList.remove('loading');
      document.getElementById('password').value = '';
      document.getElementById('password').focus();
    }
  } catch (err) {
    errMsg.textContent = 'Ошибка соединения. Попробуйте ещё раз.';
    errMsg.classList.add('visible');
    btn.disabled = false;
    btn.classList.remove('loading');
  }
});
</script>
</body>
</html>
