<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>YDA · Sign In</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:      #0D0D0D;
  --surface: #161616;
  --border:  #282828;
  --border2: #383838;
  --text:    #F2F2F2;
  --text2:   #C0C0C0;
  --muted:   #6E6E6E;
  --muted2:  #4A4A4A;
  --accent:  #29BA74;
  --accent-dim: rgba(41,186,116,0.12);
  --red:     #F87171;
  --r:       12px;
  --r-sm:    10px;
  --font:    'Geist', -apple-system, 'SF Pro Display', system-ui, sans-serif;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0 }
html { height: 100%; background: var(--bg) }
body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  min-height: 100%;
  display: flex; align-items: center; justify-content: center;
  -webkit-font-smoothing: antialiased;
  padding: 24px 20px;
  padding-bottom: max(24px, env(safe-area-inset-bottom));
}

/* Background grid */
body::before {
  content: '';
  position: fixed; inset: 0;
  background-image:
    linear-gradient(rgba(41,186,116,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(41,186,116,0.03) 1px, transparent 1px);
  background-size: 48px 48px;
  pointer-events: none;
}

/* Glow */
body::after {
  content: '';
  position: fixed;
  top: -20%; left: 50%; transform: translateX(-50%);
  width: 600px; height: 400px;
  background: radial-gradient(ellipse, rgba(41,186,116,0.06) 0%, transparent 70%);
  pointer-events: none;
}

.card {
  width: 100%; max-width: 380px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 18px;
  padding: 36px 32px;
  position: relative; z-index: 1;
  animation: fadeUp 0.4s cubic-bezier(0.4,0,0.2,1) both;
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px) }
  to   { opacity: 1; transform: translateY(0) }
}

/* Logo */
.logo-wrap {
  display: flex; align-items: center; gap: 12px;
  margin-bottom: 28px;
}
.logo-mark {
  width: 40px; height: 40px;
  border-radius: 50%;
  background: var(--accent);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.logo-mark-text {
  font-size: 13px; font-weight: 700;
  color: #fff; letter-spacing: 0.05em;
}
.logo-name {
  font-size: 16px; font-weight: 600;
  letter-spacing: -0.3px; color: var(--text);
}
.logo-sub {
  font-size: 12px; color: var(--muted);
  margin-top: 1px;
}

h1 {
  font-size: 22px; font-weight: 600;
  letter-spacing: -0.5px; color: var(--text);
  margin-bottom: 6px;
}
.subtitle {
  font-size: 13px; color: var(--muted);
  margin-bottom: 28px; line-height: 1.5;
}

label {
  display: block;
  font-size: 12px; font-weight: 500;
  color: var(--text2); letter-spacing: 0.1px;
  margin-bottom: 6px;
}
.input-wrap { margin-bottom: 14px }
input[type="text"],
input[type="password"] {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--border2);
  border-radius: var(--r-sm);
  color: var(--text);
  font-family: var(--font);
  font-size: 15px; font-weight: 400;
  padding: 12px 14px;
  outline: none;
  transition: border-color 0.2s;
  -webkit-appearance: none;
  appearance: none;
}
input::placeholder { color: var(--muted2) }
input:focus { border-color: var(--accent) }

.submit-btn {
  width: 100%;
  background: var(--accent); color: #fff;
  border: none; border-radius: var(--r-sm);
  font-family: var(--font);
  font-size: 15px; font-weight: 600;
  padding: 14px;
  margin-top: 6px;
  transition: opacity 0.2s, transform 0.1s;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 8px;
  -webkit-tap-highlight-color: transparent;
}
.submit-btn:active { opacity: 0.85; transform: scale(0.99) }
.submit-btn:disabled { opacity: 0.4; cursor: default }

.spinner {
  width: 16px; height: 16px;
  border: 2px solid rgba(255,255,255,0.3);
  border-top-color: #fff;
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
  display: none;
}
.spinner.show { display: block }
@keyframes spin { to { transform: rotate(360deg) } }

.error-msg {
  display: none;
  background: rgba(248,113,113,0.08);
  border: 1px solid rgba(248,113,113,0.2);
  border-radius: var(--r-sm);
  padding: 10px 13px;
  font-size: 13px; color: var(--red);
  margin-bottom: 14px;
}
.error-msg.show { display: block }

.divider {
  height: 1px; background: var(--border);
  margin: 24px 0 20px;
}
.footer-note {
  font-size: 11px; color: var(--muted);
  text-align: center; line-height: 1.5;
}
</style>
</head>
<body>
<div class="card">
  <div class="logo-wrap">
    <div class="logo-mark">
      <span class="logo-mark-text">YDA</span>
    </div>
    <div>
      <div class="logo-name">YDA AI News</div>
      <div class="logo-sub">Dmitrii Yudin · AI Strategy</div>
    </div>
  </div>

  <h1>Sign in</h1>
  <p class="subtitle">Access your personal AI news dashboard</p>

  <div class="error-msg" id="err-msg">Incorrect username or password</div>

  <form id="login-form" onsubmit="doLogin(event)">
    <div class="input-wrap">
      <label for="username">Username</label>
      <input type="text" id="username" name="username" placeholder="Enter username" autocomplete="username" autocapitalize="none" spellcheck="false" required>
    </div>
    <div class="input-wrap">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" placeholder="Enter password" autocomplete="current-password" required>
    </div>
    <button type="submit" class="submit-btn" id="submit-btn">
      <div class="spinner" id="spinner"></div>
      <span id="btn-label">Sign in</span>
    </button>
  </form>

  <div class="divider"></div>
  <p class="footer-note">YDA · AI Strategy &amp; Growth</p>
</div>

<script>
async function doLogin(e) {
  e.preventDefault();
  const btn=document.getElementById('submit-btn');
  const lbl=document.getElementById('btn-label');
  const spin=document.getElementById('spinner');
  const err=document.getElementById('err-msg');
  const u=document.getElementById('username').value.trim();
  const p=document.getElementById('password').value;
  err.classList.remove('show');
  btn.disabled=true; lbl.textContent='Signing in...'; spin.classList.add('show');
  try {
    const params=new URLSearchParams(window.location.search);
    const next=params.get('next')||'/';
    const r=await fetch('/login',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      credentials:'include',
      body:JSON.stringify({username:u,password:p})
    });
    const data=await r.json();
    if (data.ok) { window.location.href=next; }
    else { throw new Error(data.error||'Invalid credentials'); }
  } catch(ex) {
    err.textContent=ex.message||'Incorrect username or password';
    err.classList.add('show');
    btn.disabled=false; lbl.textContent='Sign in'; spin.classList.remove('show');
  }
}
</script>
</body>
</html>
