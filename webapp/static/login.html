<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Dmitrii Yudin | AI Strategy & Growth</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:      #0a0a0c;
  --bg2:     #111114;
  --surface: #18181c;
  --border:  #222228;
  --border2: #2e2e36;
  --text:    #f0f0f2;
  --text2:   #9898a8;
  --text3:   #5a5a6a;
  --accent:  #c8a96e;
  --accent2: #e0c080;
  --red:     #e05555;
  --r:       10px;
}

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
  -webkit-font-smoothing: antialiased;
}

body {
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 24px;
}

/* ── Background pattern ──────────────────────────────────────── */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse 60% 40% at 50% 0%, rgba(200,169,110,0.06) 0%, transparent 70%),
    radial-gradient(ellipse 40% 30% at 80% 80%, rgba(200,169,110,0.03) 0%, transparent 60%);
  pointer-events: none;
  z-index: 0;
}

/* ── Card ────────────────────────────────────────────────────── */
.card {
  position: relative;
  z-index: 1;
  width: 100%;
  max-width: 360px;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 40px 32px 36px;
  box-shadow: 0 24px 64px rgba(0,0,0,0.5);
}

/* ── Logo ────────────────────────────────────────────────────── */
.logo {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 32px;
}

.logo-mark {
  width: 36px; height: 36px;
  border: 1.5px solid var(--accent);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}

.logo-text {
  font-size: 11px; font-weight: 700;
  letter-spacing: 0.6px; text-transform: uppercase;
  color: var(--text);
  line-height: 1.4;
}
.logo-text span { color: var(--accent); }

/* ── Heading ─────────────────────────────────────────────────── */
.heading {
  font-size: 22px; font-weight: 700;
  letter-spacing: -0.3px;
  color: var(--text);
  margin-bottom: 6px;
}

.subheading {
  font-size: 13px; color: var(--text3);
  margin-bottom: 28px;
  letter-spacing: 0.1px;
}

/* ── Form ────────────────────────────────────────────────────── */
.field {
  margin-bottom: 14px;
}

.field label {
  display: block;
  font-size: 10px; font-weight: 700;
  letter-spacing: 0.8px; text-transform: uppercase;
  color: var(--text3);
  margin-bottom: 6px;
}

.field input {
  width: 100%;
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: var(--r);
  color: var(--text);
  font-size: 14px;
  padding: 12px 14px;
  outline: none;
  transition: border-color 0.2s;
  -webkit-appearance: none;
}

.field input::placeholder { color: var(--text3); }

.field input:focus {
  border-color: var(--accent);
}

/* ── Error ───────────────────────────────────────────────────── */
.error-msg {
  display: none;
  font-size: 12px; color: var(--red);
  background: rgba(224,85,85,0.08);
  border: 1px solid rgba(224,85,85,0.2);
  border-radius: 8px;
  padding: 10px 12px;
  margin-bottom: 16px;
  letter-spacing: 0.1px;
}
.error-msg.visible { display: block; }

/* ── Submit button ───────────────────────────────────────────── */
.submit-btn {
  width: 100%;
  background: var(--accent);
  color: #000;
  border: none;
  border-radius: var(--r);
  font-size: 13px; font-weight: 700;
  letter-spacing: 0.6px; text-transform: uppercase;
  padding: 14px;
  margin-top: 8px;
  cursor: pointer;
  transition: opacity 0.2s, transform 0.1s;
  position: relative;
  overflow: hidden;
}

.submit-btn:hover { opacity: 0.9; }
.submit-btn:active { transform: scale(0.98); opacity: 0.8; }
.submit-btn:disabled { opacity: 0.45; cursor: default; transform: none; }

/* Loading spinner inside button */
.submit-btn .spinner {
  display: none;
  width: 16px; height: 16px;
  border: 2px solid rgba(0,0,0,0.3);
  border-top-color: #000;
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
  position: absolute;
  right: 16px; top: 50%; transform: translateY(-50%);
}
.submit-btn.loading .spinner { display: block; }
.submit-btn.loading .btn-text { opacity: 0.6; }

@keyframes spin { to { transform: translateY(-50%) rotate(360deg); } }

/* ── Divider ─────────────────────────────────────────────────── */
.divider {
  height: 1px;
  background: var(--border);
  margin: 28px 0 20px;
}

/* ── Footer ──────────────────────────────────────────────────── */
.footer {
  font-size: 11px; color: var(--text3);
  text-align: center;
  letter-spacing: 0.2px;
}
</style>
</head>
<body>

<div class="card">
  <!-- Logo -->
  <div class="logo">
    <div class="logo-mark">
      <svg viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg" width="14" height="14">
        <rect x="1" y="1" width="5" height="5" rx="1" fill="#c8a96e"/>
        <rect x="8" y="1" width="5" height="5" rx="1" fill="#c8a96e" opacity="0.5"/>
        <rect x="1" y="8" width="5" height="5" rx="1" fill="#c8a96e" opacity="0.5"/>
        <rect x="8" y="8" width="5" height="5" rx="1" fill="#c8a96e" opacity="0.3"/>
      </svg>
    </div>
    <div class="logo-text">Dmitrii Yudin | AI <span>Strategy & Growth</span></div>
  </div>

  <!-- Heading -->
  <div class="heading">Вход</div>
  <div class="subheading">Доступ только для авторизованных пользователей</div>

  <!-- Error -->
  <div class="error-msg" id="error-msg">Неверный логин или пароль</div>

  <!-- Form -->
  <form id="login-form" autocomplete="on">
    <div class="field">
      <label for="username">Логин</label>
      <input
        type="text"
        id="username"
        name="username"
        placeholder="Введите логин"
        autocomplete="username"
        autocapitalize="none"
        spellcheck="false"
        required
      >
    </div>
    <div class="field">
      <label for="password">Пароль</label>
      <input
        type="password"
        id="password"
        name="password"
        placeholder="Введите пароль"
        autocomplete="current-password"
        required
      >
    </div>

    <button type="submit" class="submit-btn" id="submit-btn">
      <span class="btn-text">Войти</span>
      <span class="spinner"></span>
    </button>
  </form>

  <div class="divider"></div>
  <div class="footer">AI Strategy & Growth — Private Access</div>
</div>

<script>
const form    = document.getElementById('login-form');
const btn     = document.getElementById('submit-btn');
const errMsg  = document.getElementById('error-msg');

// Показываем ошибку если ?error=1 в URL
if (new URLSearchParams(location.search).get('error') === '1') {
  errMsg.classList.add('visible');
}

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  errMsg.classList.remove('visible');
  btn.disabled = true;
  btn.classList.add('loading');

  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;

  try {
    const res = await fetch('/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password }),
      credentials: 'include',
    });
    const data = await res.json();
    if (data.ok) {
      // Редирект на главную
      const next = new URLSearchParams(location.search).get('next') || '/';
      window.location.href = next;
    } else {
      errMsg.classList.add('visible');
      btn.disabled = false;
      btn.classList.remove('loading');
      document.getElementById('password').value = '';
      document.getElementById('password').focus();
    }
  } catch (err) {
    errMsg.textContent = 'Ошибка соединения. Попробуйте ещё раз.';
    errMsg.classList.add('visible');
    btn.disabled = false;
    btn.classList.remove('loading');
  }
});
</script>
</body>
</html>
